<!DOCTYPE html>
<html>
<head>
	 <title>Table res</title>
	<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
	<style>
		table,td,tr{
			border: 1px solid red;
		}
		table{width: 300px;height: 200px}
		div{
			border: 1px black dotted;
			width: 200px;
			height: 150px;
		}
	</style>
</head>
<body>
	<div class="w3-responsive">
	<table class="w3-border">
		<tr>
			<td>Name</td>
			<td>Course</td>
			<td>Fee</td>
		</tr>
		<tr>
			<td>Amit</td>
			<td>CCC</td>
			<td>4000</td>
		</tr>
		<tr>
			<td>Sumit</td>
			<td>CCC</td>
			<td>3500</td>
		</tr>
		<tr>
			<td>Animesh</td>
			<td>DCA</td>
			<td>5000</td>
		</tr>
	</table>
</div>
</body>
</html>
